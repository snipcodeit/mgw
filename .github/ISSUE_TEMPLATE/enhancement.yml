name: Enhancement
description: New feature or improvement to existing functionality
labels: ["enhancement"]
body:
  - type: textarea
    id: bluf
    attributes:
      label: BLUF
      description: Bottom Line Up Front — one sentence summary of what you want
      placeholder: "Add mgw:init command to bootstrap repos for MGW integration"
    validations:
      required: true

  - type: textarea
    id: whats-needed
    attributes:
      label: What's Needed
      description: What should change or be added, with specifics
      placeholder: |
        - New command that creates .mgw/ directory structure
        - Adds GitHub issue/PR templates
        - Ensures .gitignore entries
    validations:
      required: true

  - type: textarea
    id: whats-involved
    attributes:
      label: What's Involved
      description: Files, systems, and scope estimate
      placeholder: |
        - `.claude/commands/mgw/init.md` — new command
        - Template files to copy into target repo
        - Scope: small (1-2 files)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Design references, related issues, or workflow context
    validations:
      required: false
