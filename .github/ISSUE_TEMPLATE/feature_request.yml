name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: bluf
    attributes:
      label: BLUF
      description: Bottom Line Up Front — one sentence summary of what you want
      placeholder: "Add mgw:init command to bootstrap repos for MGW integration"
    validations:
      required: true

  - type: textarea
    id: problem-motivation
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? Why is it needed?
      placeholder: |
        Currently there's no way to quickly onboard a new repo into the MGW workflow.
        Users have to manually create directory structures and config files.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How should this work? Be as specific as possible.
      placeholder: |
        - New command `mgw:init` that creates `.mgw/` directory structure
        - Adds GitHub issue/PR templates
        - Ensures `.gitignore` entries
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about and why they were rejected
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Design references, related issues, screenshots, or workflow context
    validations:
      required: false
