slash-commands:
  - changed-files:
      - any-glob-to-any-file:
          - 'commands/**'
          - '.claude/**'

core:
  - changed-files:
      - any-glob-to-any-file:
          - 'lib/**'

templates:
  - changed-files:
      - any-glob-to-any-file:
          - 'templates/**'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'README.md'
          - 'docs/**'
          - 'CONTRIBUTING.md'
          - 'CODEOWNERS'
          - 'CHANGELOG.md'
          - '*.md'

github-config:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'

triage-pipeline:
  - changed-files:
      - any-glob-to-any-file:
          - 'commands/issue.md'
          - 'commands/run.md'
          - 'commands/review.md'
          - '.claude/commands/mgw/workflows/state.md'
          - '.claude/commands/mgw/workflows/github.md'
